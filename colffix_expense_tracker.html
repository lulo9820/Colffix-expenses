
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-sans)}
.app{max-width:390px;margin:0 auto;min-height:600px;background:var(--color-background-tertiary);position:relative;overflow:hidden}
.header{background:#2D2D2D;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.header-title{color:#fff;font-size:15px;font-weight:500;letter-spacing:.2px}
.header-orange{color:#E8621A}
.header-sub{color:#888;font-size:11px;margin-top:2px}
.gs-dot{width:6px;height:6px;border-radius:3px;background:#0F9D58;display:inline-block;margin-right:4px;vertical-align:middle}
.month-nav{display:flex;align-items:center;gap:6px}
.nav-arrow{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px;line-height:1}
.nav-arrow:disabled{opacity:.3;cursor:default}
.content{padding:14px;padding-bottom:80px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:14px;border:0.5px solid var(--color-border-tertiary)}
.stat-label{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-value.orange{color:#E8621A}
.stat-sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px;border:0.5px solid var(--color-border-tertiary)}
.section-label{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.expense-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.expense-item:last-child{border-bottom:none}
.exp-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.exp-detail{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.exp-amount{font-size:15px;font-weight:500;color:#E8621A;text-align:right}
.exp-date{font-size:11px;color:var(--color-text-secondary);text-align:right;margin-top:2px}
.del-btn{font-size:10px;color:#C0392B;background:none;border:none;cursor:pointer;display:block;margin-top:2px;text-align:right}
.client-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.client-bar:last-child{border-bottom:none}
.client-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.client-count{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.client-amount{font-size:15px;font-weight:500;color:#E8621A}
.client-pct{font-size:11px;color:var(--color-text-secondary);text-align:right;margin-top:2px}
.empty{text-align:center;padding:24px 0;color:var(--color-text-secondary);font-size:13px}
.fab{position:absolute;bottom:72px;right:16px;width:52px;height:52px;border-radius:26px;background:#E8621A;border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(232,98,26,.35);z-index:10;line-height:1}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);display:flex;z-index:9}
.nav-btn{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font-sans)}
.nav-lbl{font-size:10px}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--color-background-primary);z-index:20;display:flex;flex-direction:column;min-height:600px}
.form-header{background:#2D2D2D;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.form-title{color:#fff;font-size:15px;font-weight:500}
.form-date{color:#888;font-size:11px;margin-top:2px}
.close-btn{background:none;border:none;color:#888;font-size:20px;cursor:pointer;line-height:1;padding:4px}
.form-body{flex:1;overflow-y:auto;padding:0 0 16px}
.amount-box{background:var(--color-background-secondary);margin:14px;border-radius:var(--border-radius-lg);padding:18px;text-align:center}
.amount-lbl{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.amount-row{display:flex;align-items:center;justify-content:center}
.dollar{font-size:28px;font-weight:500;color:var(--color-text-secondary);margin-right:4px}
.amount-input{font-size:38px;font-weight:500;color:var(--color-text-primary);border:none;background:none;width:160px;text-align:center;outline:none;font-family:var(--font-sans)}
.form-section{padding:0 14px;margin-bottom:14px}
.form-lbl{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.client-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.client-btn{padding:11px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;text-align:center;font-family:var(--font-sans)}
.client-btn.active{border:1.5px solid #E8621A;background:rgba(232,98,26,.08);color:#E8621A;font-weight:500}
.cat-row{display:flex;gap:7px;flex-wrap:wrap}
.cat-btn{padding:7px 13px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px;cursor:pointer;font-family:var(--font-sans)}
.cat-btn.active{background:#E8621A;color:#fff;border-color:#E8621A}
.text-input{width:100%;padding:11px 13px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);font-size:14px;color:var(--color-text-primary);outline:none;background:var(--color-background-primary);font-family:var(--font-sans)}
.text-input:focus{border-color:#E8621A}
.save-btn{margin:0 14px;padding:14px;border-radius:var(--border-radius-lg);background:#E8621A;border:none;color:#fff;font-size:15px;font-weight:500;cursor:pointer;width:calc(100% - 28px);font-family:var(--font-sans);flex-shrink:0}
.save-btn:disabled{opacity:.6;cursor:default}
.total-footer{border-top:1.5px solid #E8621A;padding-top:10px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.toast{position:absolute;bottom:85px;left:50%;transform:translateX(-50%);background:#2D2D2D;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:50;white-space:nowrap;pointer-events:none}
</style>

<div class="app" id="app">
  <div class="header">
    <div>
      <div class="header-title">Colf<span class="header-orange">Fix</span> · Parts & Expenses</div>
      <div class="header-sub" id="header-sub"><span class="gs-dot"></span>Connected to Google Sheets</div>
    </div>
    <div class="month-nav">
      <button class="nav-arrow" id="prev-month" onclick="changeMonth(-1)">‹</button>
      <button class="nav-arrow" id="next-month" onclick="changeMonth(1)" disabled>›</button>
    </div>
  </div>

  <div class="content" id="main-content"></div>
  <button class="fab" onclick="openForm()" aria-label="Add expense">+</button>

  <div class="bottom-nav">
    <button class="nav-btn" id="tab-home" onclick="setTab('home')">
      <span style="font-size:18px">⊞</span>
      <span class="nav-lbl" style="color:#E8621A">Home</span>
    </button>
    <button class="nav-btn" id="tab-history" onclick="setTab('history')">
      <span style="font-size:18px">☰</span>
      <span class="nav-lbl" style="color:var(--color-text-secondary)">History</span>
    </button>
  </div>

  <div class="overlay" id="form-overlay" style="display:none">
    <div class="form-header">
      <div>
        <div class="form-title">Log expense</div>
        <div class="form-date" id="form-date"></div>
      </div>
      <button class="close-btn" onclick="closeForm()">✕</button>
    </div>
    <div class="form-body">
      <div class="amount-box">
        <div class="amount-lbl">Amount</div>
        <div class="amount-row">
          <span class="dollar">$</span>
          <input class="amount-input" type="number" inputmode="decimal" placeholder="0.00" id="inp-amount" step="0.01" min="0" autocomplete="off">
        </div>
      </div>
      <div class="form-section">
        <div class="form-lbl">Client</div>
        <div class="client-grid" id="client-grid"></div>
      </div>
      <div class="form-section">
        <div class="form-lbl">Job # or address</div>
        <input class="text-input" type="text" placeholder="e.g. #1749 or 123 Main St" id="inp-job" autocomplete="off">
      </div>
      <div class="form-section">
        <div class="form-lbl">Category</div>
        <div class="cat-row" id="cat-row"></div>
      </div>
      <div class="form-section">
        <div class="form-lbl">Note (optional)</div>
        <input class="text-input" type="text" placeholder="e.g. A/C capacitor, filter..." id="inp-note" autocomplete="off">
      </div>
    </div>
    <button class="save-btn" id="save-btn" onclick="saveExpense()">Save expense</button>
  </div>

  <div class="toast" id="toast" style="display:none"></div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbypSDzH-vtCQMtO2binWh5dldeDNLGsrb-lT8Ytt_2pw7RiGqib57EF3YIAWFiwrx9Y/exec';
const CLIENTS = ['Envirotek','We Host','Trident','Others'];
const CATS = ['Parts & Materials','Fuel','Tools','Other'];
const ORANGE = '#E8621A';

let curTab='home', selClient='', selCat='Parts & Materials';
let selMonth={y:new Date().getFullYear(),m:new Date().getMonth()+1};
let expenses=[], loading=true;

function getKey(y,m){return `cf_exp_${y}_${String(m).padStart(2,'0')}`}
function todayStr(){return new Date().toISOString().split('T')[0]}
function fmtMoney(n){return '$'+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function fmtDate(s){return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function fmtMonth(y,m){return new Date(y,m-1).toLocaleDateString('en-US',{month:'long',year:'numeric'})}
function isCurrentMonth(){const n=new Date();return selMonth.y===n.getFullYear()&&selMonth.m===n.getMonth()+1}

function fmtLoggedAt(){
  const d=new Date();
  return d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'})+' '+
    d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.display='none',2500);
}

async function loadExpenses(){
  loading=true;render();
  try{const r=await window.storage.get(getKey(selMonth.y,selMonth.m),true);expenses=r?JSON.parse(r.value):[];}
  catch(e){expenses=[];}
  loading=false;render();
}

async function sendToSheet(exp){
  const payload={
    date: exp.date.replace(/-/g,'/').replace(/(\d{4})\/(\d{2})\/(\d{2})/,'$2/$3/$1'),
    client: exp.client,
    job: exp.job,
    category: exp.cat,
    amount: exp.amount,
    note: exp.note,
    loggedAt: exp.loggedAt
  };
  try{
    await fetch(SHEET_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  }catch(e){console.warn('Sheet sync failed',e);}
}

async function saveExpense(){
  const amt=parseFloat(document.getElementById('inp-amount').value);
  if(!amt||amt<=0){showToast('Enter a valid amount');return;}
  if(!selClient){showToast('Select a client');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    const exp={
      id:Date.now()+'_'+Math.random().toString(36).substr(2,6),
      ts:Date.now(),
      date:todayStr(),
      amount:amt,
      client:selClient,
      job:document.getElementById('inp-job').value.trim(),
      cat:selCat,
      note:document.getElementById('inp-note').value.trim(),
      loggedAt:fmtLoggedAt()
    };
    const key=getKey(new Date().getFullYear(),new Date().getMonth()+1);
    let cur=[];
    try{const r=await window.storage.get(key,true);if(r)cur=JSON.parse(r.value);}catch(e){}
    cur.unshift(exp);
    await window.storage.set(key,JSON.stringify(cur),true);
    sendToSheet(exp);
    if(isCurrentMonth())expenses=cur;
    closeForm();
    showToast('Saved ✓  Syncing to Google Sheets...');
  }catch(e){showToast('Error — try again');}
  btn.disabled=false;btn.textContent='Save expense';
}

async function deleteExpense(id){
  if(!confirm('Delete this expense?'))return;
  expenses=expenses.filter(e=>e.id!==id);
  await window.storage.set(getKey(selMonth.y,selMonth.m),JSON.stringify(expenses),true);
  render();showToast('Deleted');
}

function changeMonth(d){
  let m=selMonth.m+d,y=selMonth.y;
  if(m>12){m=1;y++;}if(m<1){m=12;y--;}
  selMonth={y,m};loadExpenses();
  document.getElementById('next-month').disabled=isCurrentMonth();
}

function setTab(t){
  curTab=t;
  ['home','history'].forEach(id=>{
    document.getElementById('tab-'+id).querySelector('.nav-lbl').style.color=id===t?ORANGE:'var(--color-text-secondary)';
  });
  render();
}

function openForm(){
  selClient='';selCat='Parts & Materials';
  ['inp-amount','inp-job','inp-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('form-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  buildClientBtns();buildCatBtns();
  document.getElementById('form-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('inp-amount').focus(),100);
}

function closeForm(){document.getElementById('form-overlay').style.display='none';}
function buildClientBtns(){document.getElementById('client-grid').innerHTML=CLIENTS.map(c=>`<button class="client-btn${c===selClient?' active':''}" onclick="pickClient('${c}')">${c}</button>`).join('');}
function buildCatBtns(){document.getElementById('cat-row').innerHTML=CATS.map(c=>`<button class="cat-btn${c===selCat?' active':''}" onclick="pickCat('${c}')">${c}</button>`).join('');}
function pickClient(c){selClient=c;buildClientBtns();}
function pickCat(c){selCat=c;buildCatBtns();}

function render(){
  const today=todayStr();
  const todayExps=expenses.filter(e=>e.date===today);
  const todayTotal=todayExps.reduce((s,e)=>s+e.amount,0);
  const monthTotal=expenses.reduce((s,e)=>s+e.amount,0);
  document.getElementById('prev-month').disabled=false;
  document.getElementById('next-month').disabled=isCurrentMonth();
  const byClient=CLIENTS.map(c=>({c,total:expenses.filter(e=>e.client===c).reduce((s,e)=>s+e.amount,0),count:expenses.filter(e=>e.client===c).length})).filter(x=>x.total>0);

  let html='';
  if(curTab==='home'){
    html+=`<div class="stat-row">
      <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value${todayTotal>0?' orange':''}">${fmtMoney(todayTotal)}</div><div class="stat-sub">${todayExps.length} expense${todayExps.length!==1?'s':''}</div></div>
      <div class="stat-card"><div class="stat-label">This month</div><div class="stat-value">${fmtMoney(monthTotal)}</div><div class="stat-sub">${expenses.length} total</div></div>
    </div>`;
    if(byClient.length>0){
      html+=`<div class="card"><div class="section-label">By client</div>`;
      byClient.forEach(({c,total,count})=>{
        const pct=monthTotal>0?Math.round(total/monthTotal*100):0;
        html+=`<div class="client-bar"><div><div class="client-name">${c}</div><div class="client-count">${count} expense${count!==1?'s':''}</div></div><div><div class="client-amount">${fmtMoney(total)}</div><div class="client-pct">${pct}%</div></div></div>`;
      });
      html+=`</div>`;
    }
    html+=`<div class="card"><div class="section-label">Recent</div>`;
    if(loading){html+=`<div class="empty">Loading...</div>`;}
    else if(expenses.length===0){html+=`<div class="empty">No expenses yet<br>Tap + to add your first one</div>`;}
    else{
      expenses.slice(0,6).forEach(e=>{
        html+=`<div class="expense-item"><div><div class="exp-name">${e.client}${e.job?` <span style="font-weight:400;font-size:11px;color:var(--color-text-secondary)">· ${e.job}</span>`:''}</div><div class="exp-detail">${e.cat}${e.note?' · '+e.note:''}</div></div><div><div class="exp-amount">${fmtMoney(e.amount)}</div><div class="exp-date">${fmtDate(e.date)}</div></div></div>`;
      });
    }
    html+=`</div>`;
  }

  if(curTab==='history'){
    html+=`<div class="card"><div class="section-label">All expenses — ${fmtMonth(selMonth.y,selMonth.m)}</div>`;
    if(loading){html+=`<div class="empty">Loading...</div>`;}
    else if(expenses.length===0){html+=`<div class="empty">No expenses for this month</div>`;}
    else{
      expenses.forEach(e=>{
        html+=`<div class="expense-item"><div><div class="exp-name">${e.client}${e.job?` <span style="font-weight:400;font-size:11px;color:var(--color-text-secondary)">· ${e.job}</span>`:''}</div><div class="exp-detail">${e.cat}${e.note?' · '+e.note:''}</div></div><div><div class="exp-amount">${fmtMoney(e.amount)}</div><div class="exp-date">${fmtDate(e.date)}</div><button class="del-btn" onclick="deleteExpense('${e.id}')">delete</button></div></div>`;
      });
      html+=`<div class="total-footer"><span style="font-weight:500;font-size:14px;color:var(--color-text-primary)">Total</span><span style="font-size:18px;font-weight:500;color:#E8621A">${fmtMoney(monthTotal)}</span></div>`;
    }
    html+=`</div>`;
  }
  document.getElementById('main-content').innerHTML=html;
}

loadExpenses();
</script>
